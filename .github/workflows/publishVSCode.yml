name: Publish in Microsoft Marketplace
on:
  release:
    types: [released]
  workflow_dispatch:

jobs:
  prepare-environment:
    name: 'Get Release Version'
    runs-on: ubuntu-latest
    environment: publish
    outputs:
      RELEASE_VERSION: ${{ steps.getVersion.outputs.version }}
      GUS_BUILD: ${{ steps.getGusBuild.outputs.gusBuild }}
      SF_CHANGE_CASE_SCHEDULE_BUILD: ${{ steps.getScheduledBuild.outputs.sfChangeCaseScheduleBuild }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: 'main'
      - id: getVersion
        run: |
          echo "version=$(node -pe "require('./package.json').version")" >> $GITHUB_OUTPUT
      - run: echo "Version is ${{ steps.getVersion.outputs.version }}"
      - id: getGusBuild
        run: |
          echo "gusBuild=${{ steps.getVersion.outputs.version }}" >> $GITHUB_OUTPUT
      - id: getScheduledBuild
        run: |
          echo "sfChangeCaseScheduleBuild=offcore.tooling.${{ steps.getVersion.outputs.version }}" >> $GITHUB_OUTPUT

  ctc-open:
    needs: [prepare-environment]
    uses: salesforcecli/github-workflows/.github/workflows/ctcOpen.yml@main
    secrets: inherit

  publish:
    needs: ['ctc-open', 'prepare-environment']
    runs-on: ubuntu-latest
    env:
      VSCE_PERSONAL_ACCESS_TOKEN: ${{ secrets.VSCE_PERSONAL_ACCESS_TOKEN }}
      PUBLISH_VERSION: ${{ needs.prepare-environment.outputs.RELEASE_VERSION }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: 'main'
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ vars.NODE_VERSION || 'lts/*' }}
      - name: Install dependencies
        run: npm ci
      - name: Package extension
        run: npx vsce package -o ./Salesforce-Semantic-DX-${{ env.PUBLISH_VERSION }}.vsix
      - name: Publish to VS Code Marketplace
        run: npx vsce publish --skip-duplicate --pat "${{ env.VSCE_PERSONAL_ACCESS_TOKEN }}" --packagePath ./Salesforce-Semantic-DX-${{ env.PUBLISH_VERSION }}.vsix
      - name: Upload vsix to GitHub Release
        if: github.event_name == 'release'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "v${{ env.PUBLISH_VERSION }}" ./Salesforce-Semantic-DX-${{ env.PUBLISH_VERSION }}.vsix --clobber

  ctcCloseSuccess:
    needs: [ctc-open, publish]
    if: needs.ctc-open.result == 'success' && needs.publish.result == 'success' && needs.ctc-open.outputs.changeCaseId
    uses: salesforcecli/github-workflows/.github/workflows/ctcClose.yml@main
    secrets: inherit
    with:
      changeCaseId: ${{ needs.ctc-open.outputs.changeCaseId }}

  ctcCloseFail:
    needs: [ctc-open, publish]
    if: always() && needs.ctc-open.outputs.changeCaseId && (needs.ctc-open.result != 'success' || needs.publish.result != 'success')
    uses: salesforcecli/github-workflows/.github/workflows/ctcClose.yml@main
    secrets: inherit
    with:
      changeCaseId: ${{ needs.ctc-open.outputs.changeCaseId }}
      status: Not Implemented
